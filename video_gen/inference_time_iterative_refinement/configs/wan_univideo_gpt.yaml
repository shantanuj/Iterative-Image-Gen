run:
  mode: step_by_step_parallel
  iterations: 3
  parallel: 1
  max_workers: null
  output_dir: outputs/wan_univideo_gpt

models:
  generator:
    provider: wan-t2v-gradio
    model: Wan2.1-T2V
    base_url: ${WAN_T2V_BASE_URL:-http://localhost:8861}
  editor:
    provider: univideo-gradio
    model: UniVideo
    base_url: ${UNIVIDEO_EDIT_BASE_URL:-http://localhost:9861}
  critic:
    provider: gpt
    model: gpt-5.2
    api_key_env: OPENAI_API_KEY
    num_frames: 6
  verifier:
    provider: gpt
    model: gpt-5.2
    api_key_env: OPENAI_API_KEY
    num_frames: 6
  eval_verifier:
    provider: gpt
    model: gpt-5.2
    api_key_env: OPENAI_API_KEY
    num_frames: 8
