run:
  mode: step_by_step_parallel
  iterations: 3
  parallel: 1
  max_workers: null
  output_dir: outputs/wan22_univideo_gpt

method:
  plan_prompt_style: embellished
  max_add_steps: 2
  max_refine_per_step: 2

generation:
  resolution: "832*480"
  num_frames: 37
  num_steps: 40
  guidance_scale: 4.0
  flow_shift: 12.0
  negative_prompt: ""

models:
  generator:
    provider: wan2.2-t2v-gradio
    model: Wan2.2-T2V-A14B
    base_url: ${WAN22_T2V_BASE_URL:-http://localhost:8871}
  editor:
    provider: univideo-gradio
    model: UniVideo
    base_url: ${UNIVIDEO_EDIT_BASE_URL:-http://localhost:9861}
  critic:
    provider: gpt
    model: gpt-5.2
    api_key_env: OPENAI_API_KEY
    num_frames: 6
  verifier:
    provider: gpt
    model: gpt-5.2
    api_key_env: OPENAI_API_KEY
    num_frames: 6
  eval_verifier:
    provider: gpt
    model: gpt-5.2
    api_key_env: OPENAI_API_KEY
    num_frames: 8
